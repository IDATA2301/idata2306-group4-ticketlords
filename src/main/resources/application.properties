spring.application.name=TicketlordsBE

# Database
database=postgres
spring.datasource.url=jdbc:postgresql://${DB_URL}
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

# JPA/Hibernate properties
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true

# Server
server.address=0.0.0.0
server.port=8080


# Pagination
wishlist.page-size=8

# JWT Configuration
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

# File Upload
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# DigitalOcean Spaces
spaces.endpoint=https://lon1.digitaloceanspaces.com/
spaces.region=lon1
spaces.bucket=ticketlords-storage
spaces.access-key=${SPACES_ACCESS_KEY}
spaces.secret-key=${SPACES_SECRET_KEY}